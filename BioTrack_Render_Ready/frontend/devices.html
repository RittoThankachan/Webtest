<!doctype html>
<html><head>
<link rel="stylesheet" href="/static/css/global.css">
<style>
body{padding:20px}.card{padding:20px;border-radius:15px;box-shadow:0 2px 12px #ccc}
button{padding:8px 14px;border:0;border-radius:8px;background:#1976d2;color:white;cursor:pointer}
input{padding:10px;width:260px;margin:5px}
table{width:100%;border-collapse:collapse}td,th{padding:10px;border-bottom:1px solid #ddd}
img{width:100px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
@media(max-width:600px){table{font-size:12px}.card{padding:10px;overflow:auto}}
</style></head>
<body>
<div class="card">
<h2>Device Management</h2>
<input id="s" placeholder="Search devices">
<div class="actions"><button onclick="location.href='/api/devices/export/excel'">Export Excel</button></div>
<table><thead><tr><th>Name</th><th>Type</th><th>Serial</th><th>QR</th><th>Action</th></tr></thead>
<tbody id="rows"></tbody></table>
</div>
<script>
let data=[];
async function load(){data=await (await fetch('/api/devices')).json();draw()}
function draw(){
 rows.innerHTML=data.filter(d=>(d.device_name+d.serial_number+d.device_type).toLowerCase().includes(s.value.toLowerCase()))
.map(d=>`<tr><td>${d.device_name}</td><td>${d.device_type}</td><td>${d.serial_number}</td>
<td><img src="/api/devices/${d.id}/qr"></td>
<td><button onclick="edit(${d.id})">Edit</button>
<button onclick="del(${d.id})">Delete</button></td></tr>`).join('')
}
s.oninput=draw;
async function del(id){await fetch('/api/devices/'+id,{method:'DELETE'});load()}
async function edit(id){
 let d=data.find(x=>x.id==id);
 let n=prompt("Device name",d.device_name);
 if(n){await fetch('/api/devices/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({...d,device_name:n})});load()}
}
load();
</script></body></html>
